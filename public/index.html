<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta
      name="description"
      content="FinanceLearn — learn finance concepts like Duolingo with comprehensive Wikipedia-powered content."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>FinanceLearn · Master Finance Concepts</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, #f4f6fc 100%);
        background-attachment: fixed;
        color: #1e2333;
      }
      #root { min-height: 100%; }
      .app-splash {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        text-align: center;
      }
      .app-splash .badge {
        width: 76px; height: 76px;
        border-radius: 22px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex; align-items: center; justify-content: center;
        font-size: 2.4rem;
        box-shadow: 0 14px 30px rgba(99, 102, 241, 0.28);
      }
      .app-splash h1 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .app-splash p { margin: 0; color: #8b93a7; font-size: 0.95rem; }
      .app-splash .spin {
        width: 26px; height: 26px;
        border: 3px solid #e6e8f1;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-splash">
        <div class="badge">💰</div>
        <h1>FinanceLearn</h1>
        <p>Loading your finance journey…</p>
        <div class="spin"></div>
      </div>
    </div>
  </body>
</html>
