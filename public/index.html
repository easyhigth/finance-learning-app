<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="FinanceLearn — learn finance concepts like Duolingo with comprehensive Wikipedia-powered content."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>FinanceLearn · Master Finance Concepts</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #000000;
        background-image:
          radial-gradient(1100px 700px at 10% -10%, rgba(255, 212, 0, 0.08), transparent 60%),
          radial-gradient(900px 600px at 100% 5%, rgba(255, 212, 0, 0.05), transparent 55%);
        background-attachment: fixed;
        color: #f5f1ea;
      }
      #root { min-height: 100%; }
      .app-splash {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        text-align: center;
      }
      .app-splash .badge {
        width: 78px; height: 78px;
        border-radius: 24px;
        background: linear-gradient(135deg, #ffe066, #ffd400 55%, #e6b800);
        display: flex; align-items: center; justify-content: center;
        font-size: 2.4rem;
        box-shadow: 0 20px 50px rgba(255, 212, 0, 0.30), inset 0 1px 0 rgba(255,255,255,0.25);
      }
      .app-splash h1 {
        margin: 0;
        font-family: 'Space Grotesk', 'Inter', sans-serif;
        font-size: 1.55rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #f5f1ea;
      }
      .app-splash p { margin: 0; color: #b8afa0; font-size: 0.95rem; }
      .app-splash .spin {
        width: 26px; height: 26px;
        border: 3px solid #2a2620;
        border-top-color: #ffd400;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-splash">
        <div class="badge">💰</div>
        <h1>FinanceLearn</h1>
        <p>Loading your finance journey…</p>
        <div class="spin"></div>
      </div>
    </div>
  </body>
</html>
